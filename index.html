<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-MED 3.0</title>
    
    <!-- PWA Metadata & Favicons -->
    <meta name="theme-color" content="#0077b6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="G-MED 3.0" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully with scope:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              med: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                800: '#075985',
                900: '#0c4a6e',
                dark: '#0f172a',
              }
            },
            animation: {
              'slide-in-left': 'slideInLeft 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              slideInLeft: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
            }
          },
        },
      }
    </script>
    <style>
      html, body {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f4f8; /* MATCHES LAYOUT BG */
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #020617; /* slate-950 */
      }
      /* Custom scrollbar for reference lists */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* Biometric Scanning Animations */
      @keyframes laserMove {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-laser-move {
        animation: laserMove 2s infinite ease-in-out;
      }
      @keyframes scaleUp {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-scale-up {
        animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .animate-shake {
        animation: shake 0.3s ease-in-out;
      }
      @keyframes vitalFlash {
        0% {
          background-color: rgba(59, 130, 246, 0.25);
          box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.6);
        }
        100% {
          background-color: transparent;
          box-shadow: none;
        }
      }
      .animate-vital-flash {
        animation: vitalFlash 1.2s ease-out;
      }
      @media print {
        @page {
          size: A4;
          margin: 15mm 20mm;
        }
        body {
          background-color: white !important;
          color: black !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        /* Hide all UI Chrome, Navigations, Headers, Footers, and AI Entries */
        header,
        footer,
        aside,
        nav,
        .print\:hidden,
        .print-hidden,
        #quick-fab-menu,
        [id*="quick-fab"],
        [id*="fab"],
        .fixed,
        /* Layout headers, profiles, searching, bottom bars, active buttons */
        [class*="BottomTab"],
        [class*="icon-nav-row"],
        [class*="bottom-tab-bar"],
        /* Sidebar Ward selection lists */
        [class*="w-full md:w-1/3 lg:w-1/4"], 
        .border-r,
        /* Clinical Action panels & AI input/dictation boxes */
        [class*="bg-blue-50"],
        [class*="bg-blue-900/10"],
        [class*="AI Smart Entry"],
        textarea::placeholder,
        input::placeholder,
        /* Buttons, clear summary triggers, synthesis prompts */
        button,
        input[type="button"],
        input[type="submit"] {
          display: none !important;
          visibility: hidden !important;
          height: 0 !important;
          width: 0 !important;
          padding: 0 !important;
          margin: 0 !important;
          border: none !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }

        /* Adjust print block wrappers to occupy full-width space */
        main,
        .print-container,
        [class*="flex-1 flex flex-col"],
        [class*="flex-1 overflow-y-auto"] {
          display: block !important;
          width: 100% !important;
          max-width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          margin: 0 !important;
          padding: 0 !important;
          border: none !important;
          box-shadow: none !important;
          background: transparent !important;
        }
        
        /* Render textareas cleanly as live readable paragraphs without resize handles or scrollbars */
        textarea, input, select {
          border: none !important;
          outline: none !important;
          box-shadow: none !important;
          background: transparent !important;
          resize: none !important;
          overflow: visible !important;
          height: auto !important;
          min-height: auto !important;
          color: #0f172a !important;
          font-weight: 500 !important;
        }

        /* Prevent page split inside discharge summary sections */
        section, .mb-10, .grid {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }

        /* Ensure clean white printing colors */
        .bg-slate-50, .bg-slate-100 {
          background-color: #f8fafc !important;
        }
        .bg-green-50 {
          background-color: #f0fdf4 !important;
        }
        .bg-amber-50 {
          background-color: #fffbeb !important;
        }
        .bg-blue-50 {
          background-color: #f0f9ff !important;
        }
        .text-slate-750, .text-slate-800 {
          color: #1e293b !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
